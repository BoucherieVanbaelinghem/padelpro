<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0f172a">
<title>Planning Tournoi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:white;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;font-size:15px}
.hdr{background:linear-gradient(135deg,#1e3a8a,#312e81);padding:20px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.1)}
.hdr h1{font-size:1.4rem;font-weight:900;color:white}
.hdr .sub{font-size:0.8rem;color:rgba(255,255,255,0.5);margin-top:2px}
.clock{font-size:1.6rem;font-weight:900;color:white;font-variant-numeric:tabular-nums}
.tabs{display:flex;gap:0;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.08)}
.tab{flex:1;padding:14px;border:none;background:none;color:rgba(255,255,255,0.5);font-size:14px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:.2s}
.tab.active{color:white;border-bottom-color:#3b82f6}
.content{padding:16px;max-width:800px;margin:0 auto}
.match-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;margin-bottom:10px;border-left:4px solid transparent}
.match-card.pending{background:rgba(59,130,246,0.1);border-left-color:#3b82f6}
.match-card.running{background:rgba(245,158,11,0.15);border-left-color:#f59e0b;animation:pulse 2s infinite}
.match-card.finished{background:rgba(255,255,255,0.04);border-left-color:rgba(34,197,94,0.5);opacity:0.85}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.8}}
.time-badge{font-size:1rem;font-weight:800;color:#60a5fa;min-width:58px;text-align:center}
.court-badge{font-size:11px;color:rgba(255,255,255,0.35);min-width:50px;text-align:center}
.teams{flex:1}
.team{font-size:0.9rem;font-weight:600}
.team.winner{color:#4ade80;font-weight:800}
.team.loser{color:rgba(255,255,255,0.4)}
.score{font-size:1.1rem;font-weight:800;color:#4ade80;white-space:nowrap}
.running-badge{font-size:10px;background:rgba(245,158,11,0.3);color:#fbbf24;padding:2px 8px;border-radius:999px;font-weight:700;white-space:nowrap}
.time-group{font-size:11px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px;padding:0 4px}
.sec{display:none}
.sec.active{display:block}
.empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3)}
.empty-icon{font-size:3rem;margin-bottom:16px}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(255,255,255,0.04);border-radius:12px;margin-bottom:8px}
.stat-name{font-weight:600;font-size:0.9rem}
.stat-vals{display:flex;gap:16px;align-items:center}
.stat-v{text-align:center;min-width:30px}
.stat-vl{font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:2px}
.stat-vv{font-size:1rem;font-weight:800}
.rank-badge{font-size:1rem;min-width:28px}
.pool-hdr{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px}
.refresh-bar{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,0.7)}
.error-state{text-align:center;padding:80px 24px}
</style>
</head>
<body>

<div class="hdr">
  <div><h1 id="t-name">Chargement…</h1><div class="sub" id="t-date"></div></div>
  <div id="clock" class="clock"></div>
</div>

<div id="main-content">

<div class="tabs">
  <button class="tab active" onclick="showTab('planning',this)">📅 Planning</button>
  <button class="tab" onclick="showTab('scores',this)">✅ Scores</button>
  <button class="tab" onclick="showTab('classement',this)">📊 Classement</button>
</div>

<div class="content">
  <div class="refresh-bar">
    <span>🔄</span>
    <span>Scannez à nouveau le QR Code ou rechargez la page pour actualiser les résultats.</span>
  </div>
  <div class="sec active" id="sec-planning"></div>
  <div class="sec" id="sec-scores"></div>
  <div class="sec" id="sec-classement"></div>
</div>

</div>

<div id="error-content" class="error-state" style="display:none">
  <div style="font-size:3rem;margin-bottom:16px">❌</div>
  <h2 style="margin-bottom:8px">Impossible de charger le tournoi</h2>
  <p style="color:rgba(255,255,255,0.4);font-size:14px">Le lien QR Code est invalide ou expiré.<br>Demandez un nouveau QR Code à l'organisateur.</p>
</div>

<script>
// Clock
function updateClock() {
  const n = new Date();
  const h = String(n.getHours()).padStart(2,'0');
  const m = String(n.getMinutes()).padStart(2,'0');
  const s = String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = h+':'+m+':'+s;
}
setInterval(updateClock, 1000);
updateClock();

// Tab switching
function showTab(id, btn) {
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  btn.classList.add('active');
}

// Parse data from URL hash
function parseData() {
  try {
    const hash = window.location.hash.replace('#','');
    if (!hash) return null;
    const json = decodeURIComponent(escape(atob(hash)));
    return JSON.parse(json);
  } catch(e) { return null; }
}

const D = parseData();

if (!D) {
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('error-content').style.display = '';
} else {
  document.getElementById('t-name').textContent = D.n || 'Tournoi de Padel';
  document.getElementById('t-date').textContent = D.d || '';

  // === PLANNING ===
  const pm = (D.matches || []).filter(m => m.t).sort((a,b) => a.t > b.t ? 1 : a.t < b.t ? -1 : 0);
  const byTime = {};
  pm.forEach(m => { if(!byTime[m.t]) byTime[m.t]=[]; byTime[m.t].push(m); });
  
  let planHtml = '';
  Object.keys(byTime).sort().forEach(time => {
    planHtml += '<div class="time-group">⏰ ' + time + '</div>';
    byTime[time].forEach(m => {
      const cls = m.s==='f' ? 'finished' : m.s==='r' ? 'running' : 'pending';
      const t1 = D.teams && D.teams[m.a] ? D.teams[m.a] : (m.a || '?');
      const t2 = D.teams && D.teams[m.b] ? D.teams[m.b] : (m.b || '?');
      const court = D.courts && D.courts[m.c] ? D.courts[m.c] : (m.c || '—');
      const t1cls = m.w === m.a ? 'winner' : (m.w ? 'loser' : '');
      const t2cls = m.w === m.b ? 'winner' : (m.w ? 'loser' : '');
      planHtml += '<div class="match-card ' + cls + '">';
      planHtml += '<div class="time-badge">' + time + '</div>';
      planHtml += '<div class="court-badge">' + court + '</div>';
      planHtml += '<div class="teams">';
      planHtml += '<div class="team ' + t1cls + '">' + t1 + '</div>';
      planHtml += '<div style="font-size:11px;color:rgba(255,255,255,0.3);margin:2px 0">vs</div>';
      planHtml += '<div class="team ' + t2cls + '">' + t2 + '</div>';
      planHtml += '</div>';
      if (m.sc) planHtml += '<div class="score">' + m.sc + '</div>';
      if (m.s === 'r') planHtml += '<span class="running-badge">⚡ En cours</span>';
      planHtml += '</div>';
    });
  });
  document.getElementById('sec-planning').innerHTML = planHtml || '<div class="empty"><div class="empty-icon">📅</div>Aucun match planifié</div>';

  // === SCORES ===
  const fm = pm.filter(m => m.s === 'f');
  let scoreHtml = '';
  if (fm.length === 0) {
    scoreHtml = '<div class="empty"><div class="empty-icon">🎾</div>Aucun match terminé pour l\'instant</div>';
  } else {
    // Group by time descending (most recent first)
    const fmDesc = [...fm].reverse();
    fmDesc.forEach(m => {
      const t1 = D.teams && D.teams[m.a] ? D.teams[m.a] : (m.a || '?');
      const t2 = D.teams && D.teams[m.b] ? D.teams[m.b] : (m.b || '?');
      const court = D.courts && D.courts[m.c] ? D.courts[m.c] : (m.c || '—');
      const t1cls = m.w === m.a ? 'winner' : 'loser';
      const t2cls = m.w === m.b ? 'winner' : 'loser';
      scoreHtml += '<div class="match-card finished">';
      scoreHtml += '<div class="time-badge">' + m.t + '</div>';
      scoreHtml += '<div class="court-badge">' + court + '</div>';
      scoreHtml += '<div class="teams">';
      scoreHtml += '<div class="team ' + t1cls + '">' + (m.w===m.a?'🏆 ':'') + t1 + '</div>';
      scoreHtml += '<div style="font-size:11px;color:rgba(255,255,255,0.3);margin:2px 0">vs</div>';
      scoreHtml += '<div class="team ' + t2cls + '">' + (m.w===m.b?'🏆 ':'') + t2 + '</div>';
      scoreHtml += '</div>';
      if (m.sc) scoreHtml += '<div class="score">' + m.sc + '</div>';
      scoreHtml += '</div>';
    });
  }
  document.getElementById('sec-scores').innerHTML = scoreHtml;

  // === CLASSEMENT ===
  const pools = D.pools || [];
  const matches = D.matches || [];
  let classHtml = '';

  if (pools.length === 0) {
    classHtml = '<div class="empty"><div class="empty-icon">📊</div>Classement non disponible</div>';
  } else {
    pools.forEach(pool => {
      const poolColors = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981'];
      const ci = pools.indexOf(pool) % poolColors.length;
      const color = poolColors[ci];

      const teamStats = (pool.ids || []).map(id => {
        let wins = 0, losses = 0, points = 0, played = 0;
        (D.matches || []).filter(m => m.s === 'f' && (m.a === id || m.b === id)).forEach(m => {
          played++;
          if (m.w === id) { wins++; points += 3; }
          else if (m.w) losses++;
          else points++;
        });
        const name = D.teams && D.teams[id] ? D.teams[id] : id;
        return { id, name, wins, losses, points, played };
      }).sort((a,b) => b.points - a.points || b.wins - a.wins);

      classHtml += '<div class="pool-hdr" style="background:' + color + '20;color:' + color + '">' + pool.n + '</div>';
      const medals = ['🥇','🥈','🥉'];
      teamStats.forEach((s, i) => {
        const winPct = s.played ? Math.round(s.wins/s.played*100) : 0;
        classHtml += '<div class="stat-row">';
        classHtml += '<span class="rank-badge">' + (medals[i] || (i+1)) + '</span>';
        classHtml += '<div class="stat-name" style="flex:1;margin:0 12px">' + s.name + '</div>';
        classHtml += '<div class="stat-vals">';
        classHtml += '<div class="stat-v"><div class="stat-vl">J</div><div class="stat-vv">' + s.played + '</div></div>';
        classHtml += '<div class="stat-v"><div class="stat-vl">V</div><div class="stat-vv" style="color:#4ade80">' + s.wins + '</div></div>';
        classHtml += '<div class="stat-v"><div class="stat-vl">Pts</div><div class="stat-vv" style="color:#60a5fa">' + s.points + '</div></div>';
        classHtml += '<div class="stat-v"><div class="stat-vl">Win%</div><div class="stat-vv">' + winPct + '%</div></div>';
        classHtml += '</div></div>';
      });
    });
  }
  document.getElementById('sec-classement').innerHTML = classHtml;
}
</script>
</body>
</html>
